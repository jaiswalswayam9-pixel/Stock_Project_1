<!DOCTYPE html>
<html>
<head>
    <title>Database</title>
</head>
<body style="background:#0b0f1a; color:white; font-family:Arial; padding:30px;">

<a href="/" style="color:black; background:#00d4aa; padding:10px 15px; text-decoration:none;">
    Back Dashboard
</a>

<h1>TSLA Database Records</h1>

<table border="1" cellpadding="10" cellspacing="0" style="width:100%; color:white;">
    <tr>
        {% for col in columns %}
        <th>{{ col }}</th>
        {% endfor %}
    </tr>

    {% for row in rows %}
    <tr>
        {% for col in columns %}
        <td>{{ row[col] }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

</body>
</html>
